<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程特色 | Summer Chinese Course</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>

        :root {
            --primary-orange: #FF8C00;
            --accent-orange: #FFA500;
            --dark-orange: #E67E00;
            --green-banner: #9DC64D;
            --dark-text: #2C2C2C;
            --light-gray: #F8F8F8;
            --border-gray: #E0E0E0;
        }

        * {
            margin: 0;
            padding: 0;
         
            box-sizing: border-box;
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            line-height: 1.6;
            color: var(--dark-text);
            background: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
.features-section {
            padding: 1.5rem 2rem 1rem;
            background: white;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .feature-card {
            text-align: center;
            padding: 1rem 1rem;
            background: white;
            border: 3px solid var(--primary-orange);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(255, 140, 0, 0.15);
        }

        .feature-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .feature-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--dark-text);
            margin-bottom: 0.4rem;
        }

        .feature-description {
            color: #666;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .features-grid {
                gap: 1.5rem;
            }
            
            .feature-card {
                padding: 1.8rem 1.3rem;
            }
        }

        @media (max-width: 768px) {
            .header-title {
                font-size: 2rem;
            }

            .header-subtitle {
                font-size: 1.2rem;
            }

            .features-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .levels-grid {
                grid-template-columns: 1fr;
            }

            .level-card {
                padding: 1.5rem;
            }

            .level-card-body {
                grid-template-columns: 1fr;
            }

            .image-placeholder,
            .image-placeholder-single {
                width: 100px;
                height: 135px;
            }

            .placeholder-icon {
                font-size: 2.5rem;
            }

            .textbook-cover-l1,
            .textbook-cover-single {
                width: 100px;
                height: 135px;
            }
        }

        @media (max-width: 480px) {
            .header-banner {
                padding: 2rem 1rem;
            }

            .header-title {
                font-size: 1.6rem;
            }

            .features-section,
            .levels-section {
                padding: 2rem 1rem;
            }

            .image-placeholder {
                width: 90px;
                height: 120px;
            }

            .image-placeholder-single {
                width: 110px;
                height: 145px;
            }

            .placeholder-icon {
                font-size: 2rem;
            }

            .placeholder-text {
                font-size: 0.75rem;
            }

            .textbook-cover-l1 {
                width: 60px;
                height: 80px;
            }

            .textbook-cover-single {
                width: 100px;
                height: 135px;
            }
        }
    
    </style>
</head>
<body>
<!-- Header Banner -->
    <!-- Features Section -->
    <div class="features-section">
        <h2 style="text-align:center; color:var(--dark-text); margin-bottom:0.8rem; font-size:1.4rem;">课程特色</h2>
        <div class="features-grid">
            <div class="feature-card">
                <div class="feature-icon">✏️</div>
                <h3 class="feature-title">零基础入门</h3>
                <p class="feature-description">从握笔、笔画、基础汉字学起，认一认、读一读、写一写，轻松开启中文学习。</p>
            </div>

            <div class="feature-card">
                <div class="feature-icon">🔍</div>
                <h3 class="feature-title">查漏补缺</h3>
                <p class="feature-description">针对学过中文但基础不牢的孩子，利用暑假复习巩固，补齐短板，迎接新学期更轻松。</p>
            </div>

            <div class="feature-card">
                <div class="feature-icon">🚀</div>
                <h3 class="feature-title">进阶提升</h3>
                <p class="feature-description">加强识字、阅读、写字与表达训练，全面提升中文能力，让孩子更上一层楼。</p>
            </div>
        </div>
    </div>

    <!-- Levels Section -->
</body>
</html>
